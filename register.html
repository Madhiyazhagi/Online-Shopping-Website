<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login/Register - MoonBeauty Shop</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
  <nav class="navbar">
    <div class="logo">MoonBeauty</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
      <li><a href="register.html" class="active"><i class="fas fa-user"></i> Login/Register</a></li>
    </ul>
    <div class="hamburger"><i class="fas fa-bars"></i></div>
  </nav>
</header>

<!-- Hero Section -->
<section class="hero hero-small">
  <div class="hero-content">
    <h1>Login or Register</h1>
    <p>Access your account or create a new one</p>
  </div>
</section>

<!-- Login/Register Section -->
<section class="auth-section">
  <div class="auth-container">
    <div class="tab-buttons">
      <button id="login-tab" class="active">Login</button>
      <button id="register-tab">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-auth">Login</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="register-name">Full Name</label>
        <input type="text" id="register-name" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" placeholder="Enter your password" required>
      </div>
      <div class="form-group">
        <label for="register-confirm">Confirm Password</label>
        <input type="password" id="register-confirm" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn btn-auth">Register</button>
    </form>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="footer-content">
    <div class="footer-left">
      <h3>MoonBeauty Shop</h3>
      <p>&copy; 2026 MoonBeauty Shop | All Rights Reserved</p>
    </div>
    <div class="footer-right">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
    </div>
  </div>
</footer>

<!-- JavaScript -->
<script src="script.js"></script>
<script>
  // Hamburger menu toggle
  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));

  // Tab toggle
  const loginTab = document.getElementById('login-tab');
  const registerTab = document.getElementById('register-tab');
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');

  loginTab.addEventListener('click', () => {
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
  });

  registerTab.addEventListener('click', () => {
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    registerForm.classList.add('active');
    loginForm.classList.remove('active');
  });

  // Placeholder: form submission alerts
  loginForm.addEventListener('submit', e => {
    e.preventDefault();
    alert('Login functionality coming soon!');
  });

  registerForm.addEventListener('submit', e => {
    e.preventDefault();
    alert('Registration functionality coming soon!');
  });
</script>

</body>
</html>
